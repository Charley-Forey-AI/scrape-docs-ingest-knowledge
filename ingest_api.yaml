components:
  schemas:
    ChunkerOptions:
      properties:
        strategy:
          $ref: "#/components/schemas/ChunkingStrategy"
          description: The strategy to use for chunking.
          default: auto
        codeLanguage:
          anyOf:
            - $ref: "#/components/schemas/Language"
            - type: "null"
          description: The programming language of the content. **Required** when
            `strategy` is `code` (unless using `auto` which can detect). If not
            provided and the `strategy` is `code` or `auto`, system will try to
            detect the language from the filename. If detection fails, `python`
            will be used as default. **Ignored** when `strategy` is `text`,
            `json`, or `openapi`.
        chunkSize:
          type: integer
          maximum: 10000
          minimum: 100
          title: Chunksize
          description: The maximum size of each chunk in tokens. Must be greater than
            `chunk_overlap`.
          default: 1000
        chunkOverlap:
          type: integer
          maximum: 5000
          minimum: 0
          title: Chunkoverlap
          description: The overlap between consecutive chunks in tokens. Helps maintain
            context across chunk boundaries. Must be less than `chunk_size`.
          default: 200
        separators:
          anyOf:
            - items:
                type: string
              type: array
            - type: "null"
          title: Separators
          description: >-
            The separators to use for chunking the content.


            **Applicable strategies:** `auto`, `text`, `code`

            **Ignored strategies:** `json`, `openapi`


            **Text strategy defaults** (if not provided):
              - `\n\n` (double newline)
              - `\n` (newline)
              - ` ` (space)
              - `""` (empty string)
              - `.` (period)

            **Code strategy:** Separators are automatically determined from
            `code_language`. Custom separators are **ignored**.


            **How it works:** Uses recursive character text splitter. Attempts
            to split on the first separator, then second, and so on, until the
            target `chunk_size` is reached.
          examples:
            - - \n\n
              - \n
              - " "
            - - .
              - "!"
              - "?"
              - \n
      type: object
      title: ChunkerOptions
      description: Chunker options that defines how the content should be chunked.
    ChunkingStrategy:
      type: string
      enum:
        - text
        - code
        - json
        - openapi
        - auto
      title: ChunkingStrategy
      description: >-
        Defines the chunking algorithm used to split document content into
        chunks.


        - `text`: Uses recursive character text splitting with configurable
        separators.
          Default separators (if not provided): `["\n\n", "\n", " ", "", "."]`.
          Respects `chunkSize` and `chunkOverlap` settings.

        - `code`: Uses language-aware splitting optimized for source code.
          Separators are automatically determined from `codeLanguage`
          (custom separators ignored).
          If `codeLanguage` is not provided, attempts to detect from filename;
          defaults to Python.
          Respects `chunkSize` and `chunkOverlap` settings.

        - `json`: Uses recursive JSON splitting that preserves JSON structure.
          The `separators` field is ignored. If individual JSON chunks exceed
          10,000 characters, they are further split using the text chunker.
          Note: `chunkOverlap` is not used for the JSON splitter
          (only for text fallback).
          Content must be valid JSON.

        - `openapi`: Specialized chunking for OpenAPI 2.0/3.0 specifications.
          Creates one chunk per API path/operation and one chunk per component
          schema. Output chunks are YAML-formatted. Examples are removed to
          reduce size. Custom `separators`, `chunkSize`, and `chunkOverlap`
          are largely ignored.
          Content must be a valid OpenAPI specification (JSON or YAML).

        - `auto` (default): Automatically detects the optimal strategy based on:
          1. Content-type header (e.g., `application/openapi+json` -> openapi,
             `application/json` -> json)
          2. File extension (e.g., `.py` -> code with Python, `.json` -> json)
          3. Document category (code, data, markup, text, or complex)
          For code files, the programming language is auto-detected from the
          filename.
