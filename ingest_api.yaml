  /v1/jobs:
    post:
      tags:
        - Job Management
      summary: Create Job
      description: Creates a new job. A document is always created in the Knowledge
        Base as part of job creation. If document creation fails, the job will
        not be created. If `downloadUrl` is provided, the job will be queued for
        processing immediately. Otherwise `uploadUrl` will be returned back and
        you are expected to upload the content to the provided URL.
      operationId: create_job_v1_jobs_post
      security:
        - OAuth2: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "202":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "400":
          description: Invalid request
          headers:
            X-Request-ID:
              description: Unique identifier for the request
              schema:
                type: string
          content:
            application/json:
              example:
                status: 400
                type: tag:InvalidPayload
                title: Invalid Payload
                detail: One of id or name is mandatory. In case of a new file upload name is
                  mandatory.
              schema:
                $ref: "#/components/schemas/TrimbleErrorPayload"
        "401":
          description: Invalid authentication token
          headers:
            X-Request-ID:
              description: Unique identifier for the request
              schema:
                type: string
          content:
