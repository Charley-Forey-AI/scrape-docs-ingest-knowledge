          maxItems: 10
          minItems: 1
          title: Libraryids
          description: Collection of libraries to search in.
        searchType:
          $ref: "#/components/schemas/SearchType"
          description: The search type to use for the query.The hybrid mode is recommended
            for most use cases.
          default: hybrid
        searchMode:
          $ref: "#/components/schemas/SearchMode"
          description: "

            **searchMode property is not supported in current version and is
            ignored**


            The search mode to use for the query in case of fulltext search.

            - `all` means all terms in the query must match (AND logic).

            - `any` means any term in the query can match (OR logic).

            \                "
          default: any
        filter:
          anyOf:
            - type: string
            - type: "null"
          title: Filter
          description: FIQL filter expression to limit the search scope based on document
            metadata attributes. Refer to the endpoint and API overview
            documentation for supported fields, operators, and examples.
        searchExtraOptions:
          $ref: "#/components/schemas/SearchExtraOptions"
          default:
            useMongoReranking: false
            numCandidates: 500
            semanticWeight: 0.75
            fulltextWeight: 0.25
            useCompressedIndex: false
      type: object
      required:
        - query
        - libraryIds
      title: SearchRequest
      description: Request model for search operations.
    SearchResourceType:
      type: string
      enum:
        - libraries
      title: SearchResourceType
      description: |-
        Enumeration of resource types for search.

        This enum defines the types of resources that can be searched
        via the search-v2 endpoint.
    SearchResponse:
      properties:
        chunks:
          items:
            $ref: "#/components/schemas/SearchResponseItem"
          type: array
          title: Chunks
          description: Chunks found based on the query.To find out which documents these
            chunks belong to, use the `documents` collection returned in the
            same response.
        documents:
          anyOf:
            - items:
                $ref: "#/components/schemas/DocumentUserResponse"
              type: array
            - type: "null"
          title: Documents
          description: All documents found chunks belong to. This information allows to
            find out the context of the chunks and the document level metadata.
        libraries:
          anyOf:
            - items:
                $ref: "#/components/schemas/LibraryUserResponse"
              type: array
            - type: "null"
          title: Libraries
          description: All requested libraries the user has access to when the fields
            parameter in the request contains `libraries`, regardless of whether
            matching chunks were found. Inaccessible libraries are silently
            excluded.
        usage:
          anyOf:
            - $ref: "#/components/schemas/SearchUsage"
            - type: "null"
          description: Number of tokens consumed while handling the request.
      type: object
      required:
        - chunks
      title: SearchResponse
      description: >-
        Chunks found based on the query.


        To find out which documents these chunks belong to, use the `documents`
        collection returned in the same response.
    SearchResponseItem:
      properties:
        id:
          type: string
          maxLength: 64
          minLength: 1
          title: Id
          description: The globally unique system generated chunk identifier.
        createdAt:
          type: string
          format: date-time
          title: Createdat
          description: The date and time the chunk was created.
        libraryId:
          type: string
          title: Libraryid
          description: The library identifier.
        documentId:
          type: string
          maxLength: 256
          minLength: 1
          title: Documentid
          description: The identifier of the document unique in the scope of the library.
        generationId:
          type: integer
          minimum: 0
          title: Generationid
          description: The generation the chunk belong to. Generations are used to group
            chunks that represent a specific document content version.
        parentChunkId:
          anyOf:
            - type: string
              maxLength: 64
              minLength: 1
            - type: "null"
          title: Parentchunkid
          description: Identifier of the parent chunk. Allows to express the
            hierarchicalstructure of the chunks. If not provided, the chunk is
            considered a top-level chunk.
        chunkIndex:
          type: integer
          minimum: 0
          title: Chunkindex
          description: Unique index of the chunk in the scope of the parent chunk or in
            the scope of the document if this is top-level chunk.
        chunkType:
          $ref: "#/components/schemas/ChunkType"
          description: Type of the chunk.
        contentType:
          anyOf:
            - type: string
              maxLength: 128
              minLength: 1
              pattern: ^[a-z-]+\/[a-z0-9.+-]+$
            - type: "null"
          title: Contenttype
          description: MIME type of the content. If not provided, the content is assumed
            to be text.
        contentLength:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
          title: Contentlength
          description: Length of the content in characters.
        content:
          anyOf:
            - type: string
            - type: "null"
          title: Content
          description: The content of the chunk. The text of base64 encoded content of the
            non textual media types.
        location:
          anyOf:
            - $ref: "#/components/schemas/ChunkLocation"
            - type: "null"
          description: Information about where this chunk is located in the source document.
        score:
          type: number
          maximum: 1
          minimum: 0
          title: Score
          description: Relevance score of the chunk for the query.
      type: object
      required:
        - id
        - createdAt
        - libraryId
        - documentId
        - generationId
        - chunkIndex
        - chunkType
        - score
      title: SearchResponseItem
      description: The chunk found as a result of the query with additional `score`
        property.
    SearchType:
      type: string
      enum:
        - fulltext
        - semantic
        - hybrid
      title: SearchType
      description: Enumeration for search types.
    SearchUsage:
      properties:
        promptTokens:
          type: integer
          title: Prompttokens
          description: The number of tokens used by the prompt.
        totalTokens:
          type: integer
          title: Totaltokens
          description: The total number of tokens used by the request.
      type: object
      required:
        - promptTokens
        - totalTokens
      title: SearchUsage
      description: The token usage information for the request.
    SearchV2Items:
      oneOf:
        - $ref: "#/components/schemas/SearchLibraryResponse"
      discriminator:
        propertyName: type
        mapping:
          libraries: "#/components/schemas/SearchLibraryResponse"
    SearchV2Response:
      properties:
        items:
          items:
            $ref: "#/components/schemas/SearchV2Items"
          type: array
          title: Items
          description: Items on this page.
        links:
          $ref: "#/components/schemas/LinksResponse"
          description: Pagination links.
      type: object
      required:
        - items
        - links
      title: SearchV2Response
      description: |-
        Response model for search-v2 endpoint.

        Returns a paginated list of search results.
    SearchV2SortBy:
      type: string
      enum:
        - -score
        - createdAt
        - -createdAt
      title: SearchV2SortBy
      description: Sort options for search-v2 results.
    TagItem:
      properties:
        name:
          type: string
          title: Name
          description: The tag value
      type: object
      required:
        - name
      title: TagItem
      description: Response model for a single tag.
    TrimbleErrorPayload:
      properties:
        status:
          type: integer
          title: Status
        type:
          $ref: "#/components/schemas/ErrorType"
        title:
          type: string
          title: Title
        detail:
          anyOf:
            - type: string
            - type: "null"
          title: Detail
      type: object
      required:
        - status
        - type
        - title
      title: TrimbleErrorPayload
      description: |-
        Trimble HTTP API Standard, Standard Error Payload.

        [Schema definition](https://api-standards.trimble-pnp.com/api-standard/http#standard-error-payload-schema)
    UpdateLibraryRequest:
      properties:
        name:
          type: string
          maxLength: 64
          minLength: 1
          title: Name
          description: The name of the library.
        description:
          type: string
          maxLength: 1024
          minLength: 1
          title: Description
          description: The optional description of the library.
        admins:
          items:
            type: string
            pattern: ^trimble-employee:(true|false)$|^trimble-automation:(true|false)$|^(users|applications|accounts|licenses-aaip):(\*|[\w_.-]+)$
            description: Actor claims
          type: array
          maxItems: 100
          minItems: 1
          title: Admins
          description: Actors that are allowed to manage the library. Use claims based
            syntax to specify the actors or categories of actors.The actor who
            creates the library is automatically added as an admin.
        users:
          items:
            type: string
            pattern: ^trimble-employee:(true|false)$|^trimble-automation:(true|false)$|^(users|applications|accounts|licenses-aaip):(\*|[\w_.-]+)$
            description: Actor claims
          type: array
          maxItems: 100
          title: Users
          description: Actors that are allowed to read and retrieve documents from the
            library. Use claims based syntax to specify the actors or categories
            of actors.
        translations:
          anyOf:
            - patternProperties:
                ^[a-z]{2}(-[A-Z]{2})?$:
                  anyOf:
                    - $ref: "#/components/schemas/UpdateLocalizableProperties"
                    - type: "null"
              propertyNames:
                maxLength: 5
                minLength: 2
                description: The language tag in the format <language>-<REGION>. For example,
                  en-US, en-UK, nl-NL, etc.
              type: object
            - type: "null"
          title: Translations
          description: Translations for the library properties.
      additionalProperties: false
      type: object
      title: UpdateLibraryRequest
      description: Request model for updating an existing library.
    UpdateLocalizableProperties:
      properties:
        name:
          anyOf:
            - type: string
              maxLength: 64
              minLength: 1
            - type: "null"
          title: Name
          description: The name of the library.
        description:
          anyOf:
            - type: string
              maxLength: 1024
              minLength: 1
            - type: "null"
          title: Description
          description: The optional description of the library.
      additionalProperties: false
      type: object
      title: UpdateLocalizableProperties
      description: PATCH model for localizable properties of a library configuration.
    UserProfileFields:
      type: string
      enum:
        - jwt
        - claims
        - roles
        - licenses
      title: UserProfileFields
      description: Fields to be included as part of the user profile response.
    UserProfileResponse:
      properties:
        id:
          type: string
          pattern: ^(users|applications):([a-zA-Z0-9-]+)$
          title: Id
          description: Actor identifier in CURIE format.
        jwt:
          anyOf:
            - additionalProperties: true
              type: object
            - type: "null"
          title: Jwt
        claims:
          anyOf:
            - items:
                type: string
              type: array
            - type: "null"
          title: Claims
        roles:
          anyOf:
            - items:
                type: string
              type: array
            - type: "null"
          title: Roles
        licenses:
          anyOf:
            - items:
                $ref: "#/components/schemas/LicenseResponse"
              type: array
            - type: "null"
          title: Licenses
      type: object
      required:
        - id
      title: UserProfileResponse
      description: Response model for user profile information.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
        - loc
        - msg
        - type
      title: ValidationError
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          scopes:
            kb: Use Knowledge Service.
          tokenUrl: https://stage.id.trimblecloud.com/oauth/token
        authorizationCode:
          scopes:
            openid: Get user identity.
            kb: Use Knowledge Service.
          authorizationUrl: https://stage.id.trimblecloud.com/oauth/authorize
          tokenUrl: https://stage.id.trimblecloud.com/oauth/token
tags:
  - name: Document Management
    description: Document management operations.
  - name: Library Management
    description: Library management operations.
  - name: Retrieval
    description: Content search and retrieval operations.
  - name: Users
    description: User information.
