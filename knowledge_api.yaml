  /v1/libraries/{libraryId}/documents/{documentId}/generations/{generationId}/publish:
    post:
      tags:
        - Document Management
      summary: Publish Staging Generation
      description: >-
        Promotes the "staging" generation of chunks to the "published"
        generation. Client must present a valid identifier of the current
        staging generation.


        Operation atomically replaces the current published generation with the
        staging generation. In case of any errors the published generation
        remains unchanged.


        In case of success, all chunks from the previous published generation
        are removed and the new generation becomes the new published generation,
        with metadata of the staging generation applied to the document.


        After this operation, the document does not have any active staging
        generation. To change the document content, the `CreateGeneration`
        operation must be used to create a new staging generation.


        This operation might take some time to complete, depending on the number
        of chunks.
      operationId: publish_staging_generation_v1_libraries__libraryId__documents__documentId__generations__generationId__publish_post
      security:
        - OAuth2: []
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
            description: The ID of the library containing the document.
            title: Libraryid
          description: The ID of the library containing the document.
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            description: The ID of the document to retrieve.
            title: Documentid
          description: The ID of the document to retrieve.
        - name: generationId
          in: path
          required: true
          schema:
            type: integer
            description: The staging generation identifier to be promoted. Must match the
              `document.stagingGenerationId` of the current staging generation.
            title: Generationid
          description: The staging generation identifier to be promoted. Must match the
            `document.stagingGenerationId` of the current staging generation.
      responses:
        "204":
          description: The generation is published successfully.
        "401":
          description: Invalid authentication token
          headers:
            X-Request-ID:
              description: Unique identifier for the request
              schema:
                type: string
          content:
            application/json:
              example:
                status: 401
                type: tag:UnAuthorized
                title: Unauthorized
                detail: The request is not authorized.
              schema:
                $ref: "#/components/schemas/TrimbleErrorPayload"
        "403":
          description: Library quota exceeded
          headers:
            X-Request-ID:
              description: Unique identifier for the request
              schema:
                type: string
          content:
            application/json:
              example:
                status: 403
                type: tag:LibraryQuotaExceeded
                title: Library Quota Exceeded
                detail: The operation would exceed the library quota.
              schema:
                $ref: "#/components/schemas/TrimbleErrorPayload"
        "409":
          description: The generation identifier does not point to the current staging
            generation
          headers:
