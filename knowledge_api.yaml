  /v1/libraries/{libraryId}/documents:
    post:
      tags:
        - Document Management
      summary: Create a document
      description: >-
        Creates a new document in the library.


        This request immediately creates a first content generation for the
        document where chunks can be uploaded to (the generation is not active
        yet).This request includes information for both document and generation
        creation.The metadata in the request (`viewers`, `source`) is associated
        with the future generation as well as applied to the document
        immediately.


        Operation is allowed only in active libraries.


        Client might provide a document identifier in the creation request. This
        is useful for tracking the correlation with the original document
        source, e.g. the document identifier in the source system can be used
        directly.

        The document identifier must be unique within the library, but might be
        not unique across libraries.

        If the document identifier is not provided, the service generates a new
        unique identifier for the document.


        After the document is created, it does not have any searchable content
        yet. The chunks must be uploaded to generation and generation must be
        published to make it searchable.


        The chunks upload is a 3 phase process:

        1. Create a generation for the document using the `CreateGeneration`
        API. This step can be skipped right after the document creation as the
        very first generation is created automatically.

        If there are any existing staging generations of chunks that were not
        published yet, they will be deleted.

        2. Upload the document chunks to the staging generation using the
        `UploadChunk` API. It supports bulk upload of up to 100 chunks in a
        single request. Chunk upload can be parallelized for better throughput.

        3. Publish the generation using the `PublishGeneration` API. At this
        point if there were any previous published generations of chunks, they
        will be deleted.
      operationId: create_document_v1_libraries__libraryId__documents_post
      security:
        - OAuth2: []
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 100
            description: The ID of the library where the document will be created.
            title: Libraryid
          description: The ID of the library where the document will be created.
        - name: fields
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/DocumentFields"
            description: Fields to be included in the response. If not provided, minimal
              number of fields will be included as default.
            default: []
            title: Fields
          description: Fields to be included in the response. If not provided, minimal
            number of fields will be included as default.
