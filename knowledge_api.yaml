  /v1/libraries/{libraryId}/documents/{documentId}/chunks:
    get:
      tags:
        - Document Management
      summary: List Chunks
      description: >-
        List chunks of the specific document. 


        The operation supports various filtering options including finding
        surrounding chunks for a given chunk id or fetching chunks by parent
        chunk id. If the chunk or parent chunk id is given as a filter, the API
        returns only chunks from the same generation as a given chunk, which
        might be not the current published generation. When listing chunks for
        the document without giving a chunk id, only chunks for the currently
        published generation are returned. 


        Results are ordered by chunk index (from smallest index to largest). 


        Operation is allowed only in active libraries.
      operationId: list_chunks_v1_libraries__libraryId__documents__documentId__chunks_get
      security:
        - OAuth2: []
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 100
            description: The ID of the library where the documents are stored.
            title: Libraryid
          description: The ID of the library where the documents are stored.
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 256
            description: The ID of the document to list chunks from.
            title: Documentid
          description: The ID of the document to list chunks from.
        - name: fields
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ChunkFields"
            description: Fields to be included in the response. If not provided, minimal
              number of fields will be included as default.
            default: []
            title: Fields
          description: Fields to be included in the response. If not provided, minimal
            number of fields will be included as default.
        - name: parentChunkId
          in: query
          required: false
          schema:
            anyOf:
              - type: string
                maxLength: 64
              - type: "null"
            description: Filter by the parent chunk identifier. If not provided, all chunks
              of the document are returned. If provided, only chunks that are
              children of the given parent chunk are returned. To return only
              top-level chunks, use the empty string as parent chunk id.
            title: Parentchunkid
          description: Filter by the parent chunk identifier. If not provided, all chunks
            of the document are returned. If provided, only chunks that are
            children of the given parent chunk are returned. To return only
            top-level chunks, use the empty string as parent chunk id.
        - name: chunkType
          in: query
          required: false
          schema:
            anyOf:
              - $ref: "#/components/schemas/ChunkType"
              - type: "null"
            description: Filter by the type of the chunk.
            title: Chunktype
          description: Filter by the type of the chunk.
        - name: chunkId
          in: query
          required: false
          schema:
            anyOf:
              - type: string
                minLength: 1
                maxLength: 64
              - type: "null"
            description: Identifier of the chunk to get neighbors of.If provided, this chunk
              and chunks that are immediately before and after it by
              `chunkIndex` are returned. The number of surrounding chunks to
              return can be controlled with the `distance` query parameter (by
              default 1).If specified the `parentChunkId` query parameter is
              ignored.
            title: Chunkid
          description: Identifier of the chunk to get neighbors of.If provided, this chunk
            and chunks that are immediately before and after it by `chunkIndex`
            are returned. The number of surrounding chunks to return can be
            controlled with the `distance` query parameter (by default 1).If
            specified the `parentChunkId` query parameter is ignored.
        - name: distance
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            description: Number of surrounding chunks to return.Works together with
              `chunkId` query parameter to return surrounding chunks.
            default: 1
            title: Distance
          description: Number of surrounding chunks to return.Works together with
            `chunkId` query parameter to return surrounding chunks.
        - name: skipToken
