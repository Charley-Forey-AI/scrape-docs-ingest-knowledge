            The version of the library. Incremented each time the library
            searchable content is updated. Meaning if new documents added or
            deleted or existing documents are updated in such a way that affects
            the search results library version is incremented.This includes both
            document content and metadata that might be used e.g. in filters. 


            Changes in access control lists (ACLs) do not affect the library
            version, as well as changes in the actor's claims managed outside of
            this service boundary.


            Library version allow to track the library state e.g. for running
            evaluations or reporting.
