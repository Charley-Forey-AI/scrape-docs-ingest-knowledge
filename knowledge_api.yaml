              example:
                status: 403
                type: tag:PermissionDenied
                title: Permission Denied
                detail: Permission denied for the requested resource.
              schema:
                $ref: "#/components/schemas/TrimbleErrorPayload"
        "422":
          description: Validation error for the request body
          headers:
