          title: License
          description: The license library is associated with. The license is in the CURIE
            format `licenses-<provider>:<id>` (e.g., `licenses-aaip:<uuid>`).
            The `provider` is the name of the license provider and the `id` is
            the identifier of the license.
        version:
          type: integer
          minimum: 0
