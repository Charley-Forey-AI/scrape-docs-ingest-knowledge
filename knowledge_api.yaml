              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /v1/libraries/{libraryId}/documents/{documentId}/generations/{generationId}/chunks:
    post:
      tags:
        - Document Management
      summary: Bulk Upload Chunks
      description: >-
        Uploads a batch of one or more chunks to a document generation. Chunks
        are always uploaded to the staging generation and not visible for
        retrieval until that generation is published.Only the actor who has
        created current staging generation can upload chunks to it.


        Aim to maximize number of chunks per request as bulk upload is more
        efficient than creating chunks individually.


        Chunks are immutable after upload. Obsolete chunks are deleted
        automatically when new generation is published.


        Error handling strategy:

        1. Fail fast the whole request in case of easy to check errors such as
        document not found, generation mismatch, request format not valid, etc.

        2. After initial validation and data preparations, chunks are inserted
        to the database in bulk in parallel. This can result potentially in
        partial upload of chunks. Response has information about chunks that
        were successfully uploaded and chunks that failed to upload with
        detailed error information.
      operationId: bulk_upload_chunks_v1_libraries__libraryId__documents__documentId__generations__generationId__chunks_post
      security:
        - OAuth2: []
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 64
            description: The ID of the library containing the document.
            title: Libraryid
          description: The ID of the library containing the document.
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 256
            description: The ID of the document the chunks belong to.
            title: Documentid
          description: The ID of the document the chunks belong to.
        - name: generationId
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
            description: The generation identifier to upload chunks to. Must match the
              **`document.stagingGenerationId`** of the current staging
              generation.
            title: Generationid
          description: The generation identifier to upload chunks to. Must match the
            **`document.stagingGenerationId`** of the current staging
            generation.
        - name: fields
          in: query
          required: false
          schema:
            type: array
            items:
